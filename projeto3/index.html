<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Empresa GSP</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
    <link rel="stylesheet" href="./framework.css" />
  </head>
  <body>
    <header class="sticky-top bg-white shadow">
      <div class="container d-flex justify-content-between align-items-center">
        <h1 class="text-success">Empresa GSP</h1>
        <nav>
          <ul class="d-flex column-gap-3 list-unstyled">
            <li>
              <a href="" class="text-decoration-none d-inline-block">Home</a>
            </li>
            <li>
              <a href="" class="text-decoration-none d-inline-block">Sobre</a>
            </li>
            <li>
              <a href="" class="text-decoration-none d-inline-block"
                >Serviços</a
              >
            </li>
            <li>
              <a href="" class="text-decoration-none d-inline-block"
                >Produtos</a
              >
            </li>
            <li>
              <a href="" class="text-decoration-none d-inline-block">Contato</a>
            </li>
            <li>
              <a href="" class="text-decoration-none d-inline-block">
                <i class="fa-solid fa-cart-shopping"></i>
              </a>
            </li>
          </ul>
        </nav>
      </div>
    </header>
    <section class="hero py-5">
      <div
        class="container py-5 d-flex justify-content-between align-items-center"
      >
        <div>
          <h2 class="text-white fs-1">
            Serviço completo para
            <span class="d-block text-uppercase"> Residências e comércio </span>
          </h2>
          <h3 class="text-white fs-2">Jardinagem e manutenção</h3>
        </div>
        <form action="" method="post" class="bg-warning p-5">
          <h4 class="text-white fs-3 text-uppercase text-center">Agendamento</h4>
          <p class="text-white text-center fs-5">Informe seus dados abaixo</p>
          <input
            type="text"
            placeholder="Nome"
            name="nome"
            required
            class="d-block w-100 form-control mt-1"
          />
          <input
            type="email"
            placeholder="Email"
            name="email"
            required
            class="d-block w-100 form-control mt-1"
          />
          <input
            type="number"
            placeholder="Telefone"
            name="telefone"
            required
            class="d-block w-100 form-control mt-1"
          />
          <input
            type="date"
            placeholder="Data"
            name="data"
            required
            class="d-block w-100 form-control mt-1"
          />
          <button type="submit" class="w-100 d-block mt-1 btn btn-dark">
            Agendar
          </button>
        </form>
      </div>
    </section>
  </body>
</html>
